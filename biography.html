<!DOCTYPE html>
<html>
<head>
<title>Biography | Briana Campbell</title>
<style>
  /* Keep your existing style block */
  :root { --bg-dark: #1a1a1a; --gold: #FFCC00; --text-light: #ffffff; --text-muted: #a0a0a0; }
  
  body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; }
  
  /* Navigation Styling */
  nav { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
  
  nav a { color: white; margin: 0 20px; text-decoration: none; font-weight: bold; }
  
  nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  .home-container { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; color: var(--text-light); }
  
  .profile-svg { width: 180px; height: 180px; padding: 20px; background: var(--bg-dark); border-radius: 50%; border: 4px solid var(--gold); }
  
  .tagline { font-family: 'Courier New', monospace; color: var(--gold); font-size: 1.3rem; margin-bottom: 30px; }
  
  .bio-box { max-width: 650px; line-height: 1.8; color: var(--text-muted); border-top: 1px solid #333; padding-top: 25px; }
  
  .cursor { display: inline-block; width: 10px; height: 20px; background-color: var(--gold); animation: blink 1s infinite; }
  
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<nav>
  <a href="index.html">HOME</a>
  <a href="biography.html" class="active">BIOGRAPHY</a>
</nav>

  <div class="bio-box">
    <p>This tab will house my professional experiences, resume, and personal brand workbook reflections.</p>
    <p style="color: var(--gold);">Content coming soon!</p>
  </div>
</div>
</body>
</html>
